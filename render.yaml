# render.yaml — Deploy FlipLearn to Render.com (free tier)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: fliplearn
    env: python
    rootDir: flipped_classroom_project
    buildCommand: |
      pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu --no-cache-dir &&
      pip install -r requirements.txt --no-cache-dir &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py create_admin
    startCommand: gunicorn flipped_classroom_project.wsgi:application --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "classroom-production-cfa8.up.railway.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://classroom-production-cfa8.up.railway.app"
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
