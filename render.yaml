# render.yaml — Deploy FlipLearn to Render.com (free tier)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: fliplearn
    env: python
    rootDir: flipped_classroom_project
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py build_rag_index
    startCommand: gunicorn flipped_classroom_project.wsgi:application --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "fliplearn.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://fliplearn.onrender.com"
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
