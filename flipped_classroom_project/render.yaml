# render.yaml — Deploy FlipLearn to Render.com (free tier)
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: fliplearn-db
    databaseName: fliplearn
    user: fliplearn
    plan: free

services:
  - type: web
    name: fliplearn
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py build_rag_index
    startCommand: gunicorn flipped_classroom_project.wsgi:application --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "fliplearn.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://fliplearn.onrender.com"
      - key: GROQ_API_KEY
        sync: false                  # Enter manually in the Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: fliplearn-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
