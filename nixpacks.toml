[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc", "libffi"]

[phases.install]
cmds = [
  "pip install --break-system-packages torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu --no-cache-dir",
  "pip install --break-system-packages -r flipped_classroom_project/requirements.txt --no-cache-dir"
]

[phases.build]
cmds = [
  "cd flipped_classroom_project && python manage.py collectstatic --noinput",
  "cd flipped_classroom_project && python manage.py migrate --noinput"
]

[start]
cmd = "cd flipped_classroom_project && python -m gunicorn flipped_classroom_project.wsgi:application --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT"
